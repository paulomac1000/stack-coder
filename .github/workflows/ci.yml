name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck all shell scripts
        run: shellcheck --severity=warning scripts/*.sh

      - name: Bash syntax check all shell scripts
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Docker Compose config validation
        run: docker compose config --quiet

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Simulate server environment
        run: |
          sudo mkdir -p /var/apps/coder
          sudo mount --bind "${{ github.workspace }}" /var/apps/coder

      - name: Create required data directories
        run: mkdir -p data/vscode data/continue data/gcloud data/ssh

      - name: Start code-server
        run: docker compose up -d --wait

      - name: Run integration tests inside container
        run: docker exec code-server bash /var/apps/coder/scripts/integration_tests.sh

      - name: Stop containers
        if: always()
        run: docker compose down
