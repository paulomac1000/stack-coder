name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
        
      - name: Shellcheck scripts
        run: shellcheck --severity=warning scripts/*.sh
        
      - name: Docker Compose Config Check
        run: docker compose config --quiet

  unit-tests:
    name: Unit Tests (Docker)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Run unit tests via container
        run: bash scripts/run_tests.sh unit

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker compose build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # docker-compose.yml uses hardcoded /var/apps paths; bind-mount the workspace there
      - name: Simulate server environment (/var/apps/coder)
        run: |
          sudo mkdir -p /var/apps/coder
          sudo mount --bind "${{ github.workspace }}" /var/apps/coder

      # Create all data/ directories so volume mounts succeed on first run
      - name: Create data directories
        run: |
          mkdir -p data/vscode data/continue data/ssh \
                   data/claude data/gemini data/google-vscode-auth \
                   data/copilot data/gh data/gcloud

      # run_tests.sh integration: starts stack, runs tests inside container, stops stack
      - name: Run integration tests
        run: bash scripts/run_tests.sh integration

      # Always clean up containers even if the test step fails
      - name: Stop containers
        if: always()
        run: docker compose down --remove-orphans || true
